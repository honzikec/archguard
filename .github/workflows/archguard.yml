name: ArchGuard

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  archguard:
    name: Architecture Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install ArchGuard
        run: go install github.com/honzikec/archguard/cmd/archguard@latest

      - name: Run ArchGuard
        id: archguard
        run: |
          set +e
          archguard check --config archguard.yaml --format sarif > archguard-results.sarif
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload SARIF results
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: archguard-results.sarif
          category: archguard

      - name: Enforce ArchGuard result
        if: always() && steps.archguard.outputs.exit_code == '2'
        run: |
          echo "ArchGuard failed with exit code ${{ steps.archguard.outputs.exit_code }}."
          echo "Usage/config/runtime error detected."
          exit 1

      - name: Report ArchGuard violations (non-blocking)
        if: always() && steps.archguard.outputs.exit_code == '1'
        run: echo "ArchGuard reported policy violations (non-blocking in this workflow). See uploaded SARIF for details."
