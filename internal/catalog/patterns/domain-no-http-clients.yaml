id: CAT-DOMAIN-NO-HTTP-CLIENTS
name: "Domain avoids transport clients"
category: "dependency"
description: "Domain code should avoid direct dependencies on HTTP client packages."
sources:
  - title: "Clean Architecture"
    url: "https://www.oreilly.com/library/view/clean-architecture-a/9780134494272/"
    license: "Reference"
detection:
  required_facts:
    - imports
  heuristic:
    type: prevalence_package_boundary
    params:
      source_globs: ["**/domain/**"]
      package_globs: ["axios", "got", "node-fetch", "undici", "@aws-sdk/**"]
      max_prevalence: 0.02
      min_support: 20
rule_template:
  kind: pattern
  template: dependency_constraint
  defaults:
    severity: warning
    params:
      relation: packages
