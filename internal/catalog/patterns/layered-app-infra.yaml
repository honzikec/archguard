id: CAT-LAYERED-APP-INFRA
name: "Layered: app avoids direct infra access"
category: "layering"
description: "Application services should avoid direct infrastructure coupling where architectural boundaries exist."
sources:
  - title: "Domain-Driven Design"
    url: "https://www.domainlanguage.com/ddd/"
    license: "Reference"
detection:
  required_facts:
    - imports
  heuristic:
    type: prevalence_boundary
    params:
      source_globs: ["**/app/**", "**/application/**"]
      target_globs: ["**/infra/**"]
      max_prevalence: 0.03
      min_support: 20
rule_template:
  kind: pattern
  template: dependency_constraint
  defaults:
    severity: warning
    params:
      relation: imports
